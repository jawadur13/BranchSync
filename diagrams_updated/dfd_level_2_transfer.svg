<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="1400" viewBox="0 0 1300 1400">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 24px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
      .process { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; rx: 25; }
      .process-text { font: 700 13px Arial, sans-serif; fill: #1e40af; text-anchor: middle; dominant-baseline: middle; }
      .data-store { fill: #ffffff; stroke: #333333; stroke-width: 1.5; }
      .ds-label { font: 700 12px Arial, sans-serif; fill: #333333; }
      .data-flow { stroke: #111827; stroke-width: 1.1; fill: none; marker-end: url(#arrow); }
      .flow-text { font: 400 10px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L5,3 z" fill="#111827"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="1300" height="1400"/>
  <text class="title" x="650" y="50">DFD Level 2: Transfer Request Lifecycle</text>

  <!-- Input -->
  <text x="50" y="150" font-weight="bold">Requester Actions</text>
  <path class="data-flow" d="M50 170 L250 170"/><text class="flow-text" x="100" y="160">Request Data</text>

  <!-- HQ Input -->
  <text x="50" y="420" font-weight="bold">HQ Logistics Officer</text>
  <path class="data-flow" d="M50 440 L250 440"/><text class="flow-text" x="100" y="430">Routing Decision</text>

  <!-- 3.1 Initiate -->
  <rect class="process" x="250" y="140" width="180" height="60"/>
  <text class="process-text" x="340" y="162">3.1 Validate &amp; Create</text>
  <text class="process-text" x="340" y="180">(PENDING_INTERNAL)</text>
  <path class="data-flow" d="M430 170 L650 170"/><text class="flow-text" x="500" y="160">Save New Request</text>

  <!-- 3.2 Internal Approval -->
  <rect class="process" x="250" y="270" width="180" height="60"/>
  <text class="process-text" x="340" y="292">3.2 Source Approval</text>
  <text class="process-text" x="340" y="310">(PENDING_HQ_APPROVAL)</text>
  <path class="data-flow" d="M430 300 L650 300"/><text class="flow-text" x="500" y="290">Update Status</text>

  <!-- 3.3 HQ Routing (NEW) -->
  <rect class="process" x="250" y="410" width="190" height="60"/>
  <text class="process-text" x="345" y="432">3.3 HQ Verify &amp; Route</text>
  <text class="process-text" x="345" y="450">(PENDING_ASSIGNMENT)</text>
  <path class="data-flow" d="M440 440 L650 440"/><text class="flow-text" x="510" y="430">Assign Destination Branch</text>

  <!-- 3.4 Acceptance & Assignment -->
  <rect class="process" x="250" y="550" width="190" height="60"/>
  <text class="process-text" x="345" y="572">3.4 Accept &amp; Assign</text>
  <text class="process-text" x="345" y="590">(PENDING_FINAL_RELEASE)</text>
  <path class="data-flow" d="M440 580 L650 580"/><text class="flow-text" x="510" y="570">Bind Driver &amp; Denominations</text>

  <!-- 3.5 Release -->
  <rect class="process" x="250" y="690" width="190" height="60"/>
  <text class="process-text" x="345" y="712">3.5 Dest. Authorization</text>
  <text class="process-text" x="345" y="730">(READY_FOR_PICKUP)</text>
  <path class="data-flow" d="M440 720 L650 720"/><text class="flow-text" x="510" y="710">Update to READY</text>

  <!-- 3.6 Logistics -->
  <rect class="process" x="250" y="830" width="190" height="60"/>
  <text class="process-text" x="345" y="852">3.6 Pickup &amp; Transit</text>
  <text class="process-text" x="345" y="870">(IN_TRANSIT → DELIVERED)</text>
  <path class="data-flow" d="M440 860 L650 860"/><text class="flow-text" x="510" y="850">Update Status &amp; Timestamps</text>

  <!-- 3.7 Closing -->
  <rect class="process" x="250" y="970" width="190" height="60"/>
  <text class="process-text" x="345" y="992">3.7 Verification &amp; Close</text>
  <text class="process-text" x="345" y="1010">(COMPLETED / REJECTED)</text>
  <path class="data-flow" d="M440 1000 L650 1000"/><text class="flow-text" x="510" y="990">Set Final Status</text>

  <!-- Data Store (D3) -->
  <path class="data-store" d="M650 100 L950 100 M650 1100 L950 1100"/>
  <text class="ds-label" x="750" y="130">D3: Transfer Database</text>

  <!-- Audit (External Process trigger) -->
  <path class="data-flow" d="M800 100 C1150 100 1150 1100 800 1100"/><text class="flow-text" x="1100" y="600">Auto-Log Action to D4</text>

  <!-- D5: Cash Vault DB (NEW) -->
  <path class="data-store" d="M650 1150 L950 1150 M650 1200 L950 1200"/>
  <text class="ds-label" x="660" y="1180">D5: Cash Vault DB</text>

  <!-- D6: Stock Inventory DB (NEW) -->
  <path class="data-store" d="M980 1150 L1250 1150 M980 1200 L1250 1200"/>
  <text class="ds-label" x="990" y="1180">D6: Stock Inventory DB</text>

  <!-- Ledger interactions from Pickup and Delivery (NEW) -->
  <path class="data-flow" d="M440 870 L440 920 L650 1150"/><text class="flow-text" x="460" y="1020">Debit Vault / SKU at Pickup</text>
  <text class="flow-text" x="460" y="1035">Credit Vault / SKU at Delivery</text>
  <path class="data-flow" d="M440 880 L500 930 L980 1150"/><text class="flow-text" x="720" y="1060">Update Stock Balances</text>

  <!-- Reversal from Close (NEW) -->
  <path class="data-flow" d="M440 1020 L440 1060 L650 1165"/><text class="flow-text" x="460" y="1090">Reversal on Rejection</text>

  <!-- Sequential flow arrows -->
  <path class="data-flow" d="M340 200 L340 270"/>
  <path class="data-flow" d="M340 330 L340 410"/>
  <path class="data-flow" d="M340 470 L340 550"/>
  <path class="data-flow" d="M340 610 L340 690"/>
  <path class="data-flow" d="M340 750 L340 830"/>
  <path class="data-flow" d="M340 890 L340 970"/>

</svg>

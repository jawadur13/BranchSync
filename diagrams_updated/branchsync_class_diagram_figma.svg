<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1500" viewBox="0 0 1800 1500">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 26px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
      .class-box { fill: #ffffff; stroke: #333333; stroke-width: 1.2; }
      .class-divider { stroke: #333333; stroke-width: 1; }
      .class-name { font: 700 13px Arial, sans-serif; fill: #111111; text-anchor: middle; dominant-baseline: middle; }
      .class-attr { font: 400 10px Arial, sans-serif; fill: #222222; }
      .class-method { font: 400 10px Arial, sans-serif; fill: #444444; font-style: italic; }
      .rel-line { stroke: #333333; stroke-width: 1.2; fill: none; }
      .multiplicity { font: 400 10px Arial, sans-serif; fill: #111111; }
      .figure-text { font: 700 18px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1800" height="1500"/>
  <rect x="15" y="15" width="1770" height="1470" fill="none" stroke="#dce8f7" stroke-width="2"/>
  
  <text class="title" x="900" y="50">BranchSync Class Diagram (Full Domain Model)</text>

  <!-- ==================== COLUMN 1: IDENTITY & ORGANIZATIONAL MASTER ==================== -->
  
  <!-- Role Class -->
  <g transform="translate(50, 100)">
    <rect class="class-box" width="220" height="80"/>
    <line class="class-divider" x1="0" y1="25" x2="220" y2="25"/>
    <line class="class-divider" x1="0" y1="55" x2="220" y2="55"/>
    <text class="class-name" x="110" y="12">Role</text>
    <text class="class-attr" x="10" y="38">+roleId: long</text>
    <text class="class-attr" x="10" y="48">+roleName: String</text>
    <text class="class-method" x="10" y="70">+getPermissions(): List&lt;String&gt;</text>
  </g>

  <!-- User Class -->
  <g transform="translate(50, 220)">
    <rect class="class-box" width="220" height="240"/>
    <line class="class-divider" x1="0" y1="25" x2="220" y2="25"/>
    <line class="class-divider" x1="0" y1="180" x2="220" y2="180"/>
    <text class="class-name" x="110" y="12">User</text>
    <text class="class-attr" x="10" y="38">+userId: long</text>
    <text class="class-attr" x="10" y="50">+employeeId: String</text>
    <text class="class-attr" x="10" y="62">+fullName: String</text>
    <text class="class-attr" x="10" y="74">+email: String</text>
    <text class="class-attr" x="10" y="86">+phoneNumber: String</text>
    <text class="class-attr" x="10" y="98">+passwordHash: String</text>
    <text class="class-attr" x="10" y="110">+role: Role</text>
    <text class="class-attr" x="10" y="122">+branch: Branch</text>
    <text class="class-attr" x="10" y="134">+department: Department</text>
    <text class="class-attr" x="10" y="146">+isAvailable: boolean</text>
    <text class="class-attr" x="10" y="158">+isActive: boolean</text>
    <text class="class-attr" x="10" y="170">+lastLoginAt: OffsetDateTime</text>
    <text class="class-method" x="10" y="195">+getAuthorities()</text>
    <text class="class-method" x="10" y="210">+toggleAvailability()</text>
    <text class="class-method" x="10" y="225">+updateProfile()</text>
  </g>

  <!-- Branch Class -->
  <g transform="translate(50, 500)">
    <rect class="class-box" width="220" height="200"/>
    <line class="class-divider" x1="0" y1="25" x2="220" y2="25"/>
    <line class="class-divider" x1="0" y1="150" x2="220" y2="150"/>
    <text class="class-name" x="110" y="12">Branch</text>
    <text class="class-attr" x="10" y="38">+branchId: long</text>
    <text class="class-attr" x="10" y="50">+branchCode: String</text>
    <text class="class-attr" x="10" y="62">+branchName: String</text>
    <text class="class-attr" x="10" y="74">+branchType: BranchType</text>
    <text class="class-attr" x="10" y="86">+district: String</text>
    <text class="class-attr" x="10" y="98">+division: String</text>
    <text class="class-attr" x="10" y="110">+address: String</text>
    <text class="class-attr" x="10" y="122">+isActive: boolean</text>
    <text class="class-attr" x="10" y="134">+createdAt: OffsetDateTime</text>
    <text class="class-method" x="10" y="165">+getVaultCash()</text>
    <text class="class-method" x="10" y="180">+getStockSummary()</text>
  </g>

  <!-- Department Class -->
  <g transform="translate(50, 740)">
    <rect class="class-box" width="220" height="100"/>
    <line class="class-divider" x1="0" y1="25" x2="220" y2="25"/>
    <line class="class-divider" x1="0" y1="70" x2="220" y2="70"/>
    <text class="class-name" x="110" y="12">Department</text>
    <text class="class-attr" x="10" y="38">+departmentId: long</text>
    <text class="class-attr" x="10" y="50">+departmentName: String</text>
    <text class="class-attr" x="10" y="62">+createdAt: OffsetDateTime</text>
    <text class="class-method" x="10" y="85">+listStaff()</text>
  </g>

  <!-- ==================== COLUMN 2: TRANSFERS & AUDITING ==================== -->

  <!-- TransferRequest Class -->
  <g transform="translate(350, 100)">
    <rect class="class-box" width="280" height="480"/>
    <line class="class-divider" x1="0" y1="25" x2="280" y2="25"/>
    <line class="class-divider" x1="0" y1="360" x2="280" y2="360"/>
    <text class="class-name" x="140" y="12">TransferRequest</text>
    <text class="class-attr" x="10" y="38">+requestId: long</text>
    <text class="class-attr" x="10" y="48">+requestCode: String</text>
    <text class="class-attr" x="10" y="58">+title: String</text>
    <text class="class-attr" x="10" y="68">+description: String</text>
    <text class="class-attr" x="10" y="78">+category: ItemCategory</text>
    <text class="class-attr" x="10" y="88">+priority: String</text>
    <text class="class-attr" x="10" y="98">+status: String</text>
    <text class="class-attr" x="10" y="108">+originBranch: Branch</text>
    <text class="class-attr" x="10" y="118">+originDepartment: Department</text>
    <text class="class-attr" x="10" y="128">+initiatedBy: User</text>
    <text class="class-attr" x="10" y="138">+internalApprover: User</text>
    <text class="class-attr" x="10" y="148">+hqApprover: User</text>
    <text class="class-attr" x="10" y="158">+hqApprovedAt: OffsetDateTime</text>
    <text class="class-attr" x="10" y="168">+hqRejectionNote: String</text>
    <text class="class-attr" x="10" y="178">+destinationBranch: Branch</text>
    <text class="class-attr" x="10" y="188">+destinationDepartment: Department</text>
    <text class="class-attr" x="10" y="198">+deptAcceptor: User</text>
    <text class="class-attr" x="10" y="208">+finalReleaser: User</text>
    <text class="class-attr" x="10" y="218">+deliveryPerson: User</text>
    <text class="class-attr" x="10" y="228">+pickedUpAt: OffsetDateTime</text>
    <text class="class-attr" x="10" y="238">+deliveredAt: OffsetDateTime</text>
    <text class="class-attr" x="10" y="248">+finalNote: String</text>
    <text class="class-attr" x="10" y="258">+closedAt: OffsetDateTime</text>
    <text class="class-attr" x="10" y="268">+requestedAmount: BigDecimal</text>
    <text class="class-attr" x="10" y="278">+denominationsSubmitted: boolean</text>
    <text class="class-attr" x="10" y="288">+stockItem: StockItem</text>
    <text class="class-attr" x="10" y="298">+quantity: Integer</text>
    <text class="class-attr" x="10" y="308">+requestedAt: OffsetDateTime</text>
    <text class="class-method" x="10" y="375">+initiate()</text>
    <text class="class-method" x="10" y="390">+approveInternal()</text>
    <text class="class-method" x="10" y="405">+hqVerify()</text>
    <text class="class-method" x="10" y="420">+assignDriver()</text>
    <text class="class-method" x="10" y="435">+releaseFinal()</text>
    <text class="class-method" x="10" y="450">+pickup()</text>
    <text class="class-method" x="10" y="465">+deliver()</text>
  </g>

  <!-- AuditLog Class -->
  <g transform="translate(350, 600)">
    <rect class="class-box" width="280" height="180"/>
    <line class="class-divider" x1="0" y1="25" x2="280" y2="25"/>
    <line class="class-divider" x1="0" y1="130" x2="280" y2="130"/>
    <text class="class-name" x="140" y="12">AuditLog</text>
    <text class="class-attr" x="10" y="38">+auditId: long</text>
    <text class="class-attr" x="10" y="48">+transferRequest: TransferRequest</text>
    <text class="class-attr" x="10" y="58">+actor: User</text>
    <text class="class-attr" x="10" y="68">+action: String</text>
    <text class="class-attr" x="10" y="78">+fromStatus: String</text>
    <text class="class-attr" x="10" y="88">+toStatus: String</text>
    <text class="class-attr" x="10" y="98">+remarks: String</text>
    <text class="class-attr" x="10" y="108">+ipAddress: String</text>
    <text class="class-attr" x="10" y="118">+actedAt: OffsetDateTime</text>
    <text class="class-method" x="10" y="145">+logAction()</text>
    <text class="class-method" x="10" y="160">+getHistory()</text>
  </g>

  <!-- ItemCategory Class -->
  <g transform="translate(350, 800)">
    <rect class="class-box" width="280" height="180"/>
    <line class="class-divider" x1="0" y1="25" x2="280" y2="25"/>
    <line class="class-divider" x1="0" y1="130" x2="280" y2="130"/>
    <text class="class-name" x="140" y="12">ItemCategory</text>
    <text class="class-attr" x="10" y="38">+categoryId: long</text>
    <text class="class-attr" x="10" y="48">+categoryName: String</text>
    <text class="class-attr" x="10" y="58">+department: Department</text>
    <text class="class-attr" x="10" y="68">+sensitivityLevel: String</text>
    <text class="class-attr" x="10" y="78">+description: String</text>
    <text class="class-attr" x="10" y="88">+behaviorType: CategoryBehavior</text>
    <text class="class-attr" x="10" y="98">+isActive: boolean</text>
    <text class="class-attr" x="10" y="108">+createdAt: OffsetDateTime</text>
    <text class="class-method" x="10" y="145">+getHandlingRules()</text>
    <text class="class-method" x="10" y="160">+isLedgerTracked()</text>
  </g>

  <!-- ==================== COLUMN 3: CASH VAULT SERVICE MODULE ==================== -->

  <!-- BranchCashBalance Class -->
  <g transform="translate(710, 100)">
    <rect class="class-box" width="280" height="110"/>
    <line class="class-divider" x1="0" y1="25" x2="280" y2="25"/>
    <line class="class-divider" x1="0" y1="75" x2="280" y2="75"/>
    <text class="class-name" x="140" y="12">BranchCashBalance</text>
    <text class="class-attr" x="10" y="38">+branchId: long</text>
    <text class="class-attr" x="10" y="48">+branch: Branch</text>
    <text class="class-attr" x="10" y="58">+currentBalance: BigDecimal</text>
    <text class="class-attr" x="10" y="68">+lastUpdatedAt: OffsetDateTime</text>
    <text class="class-method" x="10" y="90">+updateBalance()</text>
  </g>

  <!-- CashLedgerEntry Class -->
  <g transform="translate(710, 230)">
    <rect class="class-box" width="280" height="240"/>
    <line class="class-divider" x1="0" y1="25" x2="280" y2="25"/>
    <line class="class-divider" x1="0" y1="180" x2="280" y2="180"/>
    <text class="class-name" x="140" y="12">CashLedgerEntry</text>
    <text class="class-attr" x="10" y="38">+ledgerId: long</text>
    <text class="class-attr" x="10" y="48">+branch: Branch</text>
    <text class="class-attr" x="10" y="58">+entryType: String</text>
    <text class="class-attr" x="10" y="68">+transferRequest: TransferRequest</text>
    <text class="class-attr" x="10" y="78">+amount: BigDecimal</text>
    <text class="class-attr" x="10" y="88">+balanceBefore: BigDecimal</text>
    <text class="class-attr" x="10" y="98">+balanceAfter: BigDecimal</text>
    <text class="class-attr" x="10" y="118">+actor: User</text>
    <text class="class-attr" x="10" y="130">+approver: User</text>
    <text class="class-attr" x="10" y="142">+reason: String</text>
    <text class="class-attr" x="10" y="154">+createdAt: OffsetDateTime</text>
    <text class="class-method" x="10" y="195">+createEntry()</text>
  </g>

  <!-- CashManualAdjustment Class -->
  <g transform="translate(710, 490)">
    <rect class="class-box" width="280" height="220"/>
    <line class="class-divider" x1="0" y1="25" x2="280" y2="25"/>
    <line class="class-divider" x1="0" y1="160" x2="280" y2="160"/>
    <text class="class-name" x="140" y="12">CashManualAdjustment</text>
    <text class="class-attr" x="10" y="38">+adjustmentId: long</text>
    <text class="class-attr" x="10" y="48">+branch: Branch</text>
    <text class="class-attr" x="10" y="58">+amount: BigDecimal</text>
    <text class="class-attr" x="10" y="68">+reason: String</text>
    <text class="class-attr" x="10" y="78">+status: String</text>
    <text class="class-attr" x="10" y="88">+submittedBy: User</text>
    <text class="class-attr" x="10" y="98">+submittedAt: OffsetDateTime</text>
    <text class="class-attr" x="10" y="108">+approvedBy: User</text>
    <text class="class-attr" x="10" y="118">+decidedAt: OffsetDateTime</text>
    <text class="class-attr" x="10" y="128">+decisionNote: String</text>
    <text class="class-method" x="10" y="175">+submitAdjustment()</text>
    <text class="class-method" x="10" y="190">+approveAdjustment()</text>
  </g>

  <!-- CashTransferDenomination Class -->
  <g transform="translate(710, 730)">
    <rect class="class-box" width="280" height="150"/>
    <line class="class-divider" x1="0" y1="25" x2="280" y2="25"/>
    <line class="class-divider" x1="0" y1="110" x2="280" y2="110"/>
    <text class="class-name" x="140" y="12">CashTransferDenomination</text>
    <text class="class-attr" x="10" y="38">+denominationId: long</text>
    <text class="class-attr" x="10" y="48">+transferRequest: TransferRequest</text>
    <text class="class-attr" x="10" y="58">+denomination: Integer</text>
    <text class="class-attr" x="10" y="68">+quantity: Integer</text>
    <text class="class-attr" x="10" y="78">+subtotal: BigDecimal</text>
    <text class="class-attr" x="10" y="88">+submittedBy: User</text>
    <text class="class-attr" x="10" y="98">+submittedAt: OffsetDateTime</text>
    <text class="class-method" x="10" y="125">+calculateSubtotal()</text>
  </g>

  <!-- ==================== COLUMN 4: STOCK SERVICE INVENTORY ==================== -->

  <!-- StockItem Class -->
  <g transform="translate(1070, 100)">
    <rect class="class-box" width="280" height="160"/>
    <line class="class-divider" x1="0" y1="25" x2="280" y2="25"/>
    <line class="class-divider" x1="0" y1="120" x2="280" y2="120"/>
    <text class="class-name" x="140" y="12">StockItem</text>
    <text class="class-attr" x="10" y="38">+stockItemId: long</text>
    <text class="class-attr" x="10" y="48">+category: ItemCategory</text>
    <text class="class-attr" x="10" y="58">+itemName: String</text>
    <text class="class-attr" x="10" y="68">+unit: String</text>
    <text class="class-attr" x="10" y="78">+description: String</text>
    <text class="class-attr" x="10" y="88">+isActive: boolean</text>
    <text class="class-attr" x="10" y="98">+createdAt: OffsetDateTime</text>
    <text class="class-method" x="10" y="135">+validateStockBehavior()</text>
  </g>

  <!-- BranchStockBalance Class -->
  <g transform="translate(1070, 280)">
    <rect class="class-box" width="280" height="120"/>
    <line class="class-divider" x1="0" y1="25" x2="280" y2="25"/>
    <line class="class-divider" x1="0" y1="85" x2="280" y2="85"/>
    <text class="class-name" x="140" y="12">BranchStockBalance</text>
    <text class="class-attr" x="10" y="38">+balanceId: long</text>
    <text class="class-attr" x="10" y="48">+branch: Branch</text>
    <text class="class-attr" x="10" y="58">+stockItem: StockItem</text>
    <text class="class-attr" x="10" y="68">+currentQuantity: int</text>
    <text class="class-attr" x="10" y="78">+lastUpdatedAt: OffsetDateTime</text>
    <text class="class-method" x="10" y="100">+updateQuantity()</text>
  </g>

  <!-- StockLedgerEntry Class -->
  <g transform="translate(1070, 420)">
    <rect class="class-box" width="280" height="240"/>
    <line class="class-divider" x1="0" y1="25" x2="280" y2="25"/>
    <line class="class-divider" x1="0" y1="180" x2="280" y2="180"/>
    <text class="class-name" x="140" y="12">StockLedgerEntry</text>
    <text class="class-attr" x="10" y="38">+ledgerId: long</text>
    <text class="class-attr" x="10" y="48">+branch: Branch</text>
    <text class="class-attr" x="10" y="58">+stockItem: StockItem</text>
    <text class="class-attr" x="10" y="68">+entryType: String</text>
    <text class="class-attr" x="10" y="78">+transferRequest: TransferRequest</text>
    <text class="class-attr" x="10" y="88">+quantity: int</text>
    <text class="attr" x="10" y="100"> </text>
    <text class="class-attr" x="10" y="110">+balanceBefore: int</text>
    <text class="class-attr" x="10" y="122">+balanceAfter: int</text>
    <text class="class-attr" x="10" y="134">+actor: User</text>
    <text class="class-attr" x="10" y="146">+approver: User</text>
    <text class="class-attr" x="10" y="158">+reason: String</text>
    <text class="class-attr" x="10" y="170">+createdAt: OffsetDateTime</text>
    <text class="class-method" x="10" y="195">+createEntry()</text>
  </g>

  <!-- StockManualAdjustment Class -->
  <g transform="translate(1070, 680)">
    <rect class="class-box" width="280" height="220"/>
    <line class="class-divider" x1="0" y1="25" x2="280" y2="25"/>
    <line class="class-divider" x1="0" y1="160" x2="280" y2="160"/>
    <text class="class-name" x="140" y="12">StockManualAdjustment</text>
    <text class="class-attr" x="10" y="38">+adjustmentId: long</text>
    <text class="class-attr" x="10" y="48">+branch: Branch</text>
    <text class="class-attr" x="10" y="58">+stockItem: StockItem</text>
    <text class="class-attr" x="10" y="68">+quantity: int</text>
    <text class="class-attr" x="10" y="78">+reason: String</text>
    <text class="class-attr" x="10" y="88">+status: String</text>
    <text class="class-attr" x="10" y="98">+submittedBy: User</text>
    <text class="class-attr" x="10" y="108">+submittedAt: OffsetDateTime</text>
    <text class="class-attr" x="10" y="118">+approvedBy: User</text>
    <text class="class-attr" x="10" y="128">+decidedAt: OffsetDateTime</text>
    <text class="class-attr" x="10" y="138">+decisionNote: String</text>
    <text class="class-method" x="10" y="175">+submitAdjustment()</text>
    <text class="class-method" x="10" y="190">+approveAdjustment()</text>
  </g>

  <!-- ==================== RELATIONSHIPS ==================== -->
  
  <!-- Role to User -->
  <line class="rel-line" x1="270" y1="140" x2="300" y2="140" stroke="#333"/>
  <text class="multiplicity" x="275" y="130">1</text>
  <text class="multiplicity" x="310" y="240">0..*</text>

  <!-- User to TransferRequest -->
  <line class="rel-line" x1="270" y1="330" x2="350" y2="330" stroke="#333"/>
  <text class="multiplicity" x="275" y="320">1</text>
  <text class="multiplicity" x="330" y="320">0..*</text>

  <!-- ItemCategory to TransferRequest -->
  <line class="rel-line" x1="490" y1="800" x2="490" y2="580" stroke="#333"/>
  <text class="multiplicity" x="495" y="780">1</text>
  <text class="multiplicity" x="495" y="590">0..*</text>

  <!-- Branch to BranchCashBalance -->
  <line class="rel-line" x1="270" y1="550" x2="710" y2="150" stroke="#333"/>
  <text class="multiplicity" x="280" y="530">1</text>
  <text class="multiplicity" x="690" y="135">1</text>

  <!-- Branch to BranchStockBalance -->
  <line class="rel-line" x1="270" y1="600" x2="1070" y2="340" stroke="#333"/>
  <text class="multiplicity" x="280" y="580">1</text>
  <text class="multiplicity" x="1050" y="325">0..*</text>

</svg>

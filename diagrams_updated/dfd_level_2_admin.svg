<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1000" viewBox="0 0 1100 1000">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 24px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
      .process { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; rx: 20; }
      .process-text { font: 700 13px Arial, sans-serif; fill: #1e40af; text-anchor: middle; dominant-baseline: middle; }
      .data-store { fill: #ffffff; stroke: #333333; stroke-width: 1.5; }
      .ds-label { font: 700 12px Arial, sans-serif; fill: #333333; }
      .data-flow { stroke: #111827; stroke-width: 1.1; fill: none; marker-end: url(#arrow); }
      .flow-text { font: 400 10px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L5,3 z" fill="#111827"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="1100" height="1000"/>
  <text class="title" x="550" y="50">DFD Level 2: Administration &amp; Data Management</text>

  <!-- Input from Admin -->
  <text x="50" y="120" font-weight="bold">System Admin</text>
  <path class="data-flow" d="M50 140 L250 140"/><text class="flow-text" x="100" y="130">Admin Commands</text>

  <!-- 2.1 User CRUD -->
  <rect class="process" x="250" y="110" width="180" height="60"/>
  <text class="process-text" x="340" y="140">2.1 Manage Users</text>
  <path class="data-flow" d="M430 140 L650 140"/><text class="flow-text" x="500" y="130">Write User Record</text>

  <!-- 2.2 Branch CRUD -->
  <rect class="process" x="250" y="230" width="180" height="60"/>
  <text class="process-text" x="340" y="260">2.2 Manage Branches</text>
  <path class="data-flow" d="M430 260 L650 260"/><text class="flow-text" x="500" y="250">Write Branch Record</text>

  <!-- 2.3 Department Mapping -->
  <rect class="process" x="250" y="350" width="180" height="60"/>
  <text class="process-text" x="340" y="380">2.3 Map Departments</text>
  <path class="data-flow" d="M430 380 L650 380"/><text class="flow-text" x="500" y="370">Update Mappings</text>

  <!-- 2.4 Category Config -->
  <rect class="process" x="250" y="470" width="180" height="60"/>
  <text class="process-text" x="340" y="492">2.4 Item Categories</text>
  <text class="process-text" x="340" y="510">&amp; Behavior Config</text>
  <path class="data-flow" d="M430 500 L650 500"/><text class="flow-text" x="500" y="490">Save Category &amp; Behavior Type</text>

  <!-- 2.5 Stock Item (SKU) Management (NEW) -->
  <rect class="process" x="250" y="590" width="180" height="60"/>
  <text class="process-text" x="340" y="612">2.5 Stock Item</text>
  <text class="process-text" x="340" y="630">(SKU) Management</text>
  <path class="data-flow" d="M430 620 L650 620"/><text class="flow-text" x="500" y="610">Write SKU Records</text>

  <!-- Data Stores -->
  <path class="data-store" d="M650 100 L900 100 M650 200 L900 200"/>
  <text class="ds-label" x="700" y="150">D1: User DB</text>

  <path class="data-store" d="M650 220 L900 220 M650 560 L900 560"/>
  <text class="ds-label" x="700" y="395">D2: Org Config DB</text>
  <text class="ds-label" x="700" y="415">(branches, departments,</text>
  <text class="ds-label" x="700" y="435">categories, branch_depts)</text>

  <!-- D6: Stock Item Catalog (NEW) -->
  <path class="data-store" d="M650 580 L900 580 M650 680 L900 680"/>
  <text class="ds-label" x="700" y="630">D6: Stock Items Catalog</text>
  <text class="ds-label" x="700" y="650">(stock_items)</text>

  <!-- Cross-links -->
  <path class="data-flow" d="M50 140 L50 260 L250 260"/><text class="flow-text" x="60" y="220">Branch Ops</text>
  <path class="data-flow" d="M50 260 L50 380 L250 380"/><text class="flow-text" x="60" y="340">Dept Ops</text>
  <path class="data-flow" d="M50 380 L50 500 L250 500"/><text class="flow-text" x="60" y="460">Category Ops</text>
  <path class="data-flow" d="M50 500 L50 620 L250 620"/><text class="flow-text" x="60" y="580">SKU Ops</text>

  <!-- Note -->
  <rect x="200" y="730" width="700" height="60" rx="8" fill="#fff8db" stroke="#d7b84f" stroke-width="1.5"/>
  <text x="550" y="755" text-anchor="middle" font-size="12" fill="#4f4211" font-weight="600">Category Behavior Types: CASH (vault tracking), STOCK (quantity tracking), DOCUMENT_CASE (plain workflow)</text>
  <text x="550" y="775" text-anchor="middle" font-size="12" fill="#4f4211" font-weight="600">Stock Items (SKUs) are managed under categories with behavior_type = STOCK</text>

</svg>

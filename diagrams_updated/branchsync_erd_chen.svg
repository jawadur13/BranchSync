      .entity-txt { font: 700 12px Arial, sans-serif; fill: #000000; text-anchor: middle; dominant-baseline: middle; }
      .attr-ellipse { fill: #ffffff; stroke: #000000; stroke-width: 1; }
      .attr-txt { font: 500 9px Arial, sans-serif; fill: #000000; text-anchor: middle; dominant-baseline: middle; }
      .rel-diamond { fill: #ffffff; stroke: #000000; stroke-width: 1.5; }

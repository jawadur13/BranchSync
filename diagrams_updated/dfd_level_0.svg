<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="900" viewBox="0 0 1100 900">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 24px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
      .entity { fill: #f3f4f6; stroke: #374151; stroke-width: 1.5; }
      .entity-text { font: 700 14px Arial, sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .process { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 40; }
      .process-id { font: 700 16px Arial, sans-serif; fill: #1e40af; text-anchor: middle; }
      .process-text { font: 700 18px Arial, sans-serif; fill: #1e40af; text-anchor: middle; }
      .data-flow { stroke: #111827; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
      .flow-text { font: 400 11px Arial, sans-serif; fill: #374151; }
      .figure-text { font: 700 18px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L7,4 z" fill="#111827"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="1100" height="900"/>
  <text class="title" x="550" y="50">DFD Level 0: Context Diagram</text>

  <!-- Central Process -->
  <rect class="process" x="400" y="330" width="300" height="200"/>
  <line x1="400" y1="390" x2="700" y2="390" stroke="#2563eb" stroke-width="1.5"/>
  <text class="process-id" x="550" y="370">0</text>
  <text class="process-text" x="550" y="450">BranchSync System</text>

  <!-- Entities -->

  <!-- System Admin -->
  <g transform="translate(100, 100)">
    <rect class="entity" width="160" height="80"/>
    <text class="entity-text" x="80" y="40">System Admin</text>
  </g>
  <path class="data-flow" d="M180 180 L400 350"/>
  <text class="flow-text" x="220" y="245">User &amp; Org Management</text>
  <path class="data-flow" d="M400 380 L200 180"/>
  <text class="flow-text" x="220" y="290">System Activity Logs</text>

  <!-- Officer (Requester) -->
  <g transform="translate(800, 100)">
    <rect class="entity" width="160" height="80"/>
    <text class="entity-text" x="80" y="40">Officer (Requester)</text>
  </g>
  <path class="data-flow" d="M800 160 L700 350"/>
  <text class="flow-text" x="730" y="230">Transfer Requests</text>
  <path class="data-flow" d="M700 360 L820 180"/>
  <text class="flow-text" x="770" y="270">Status Notifications</text>

  <!-- Branch Manager / FEO -->
  <g transform="translate(100, 700)">
    <rect class="entity" width="160" height="80"/>
    <text class="entity-text" x="80" y="30">Branch Manager /</text>
    <text class="entity-text" x="80" y="50">FEO / OM</text>
  </g>
  <path class="data-flow" d="M260 700 L420 530"/>
  <text class="flow-text" x="260" y="610">Approval, Release &amp;</text>
  <text class="flow-text" x="260" y="625">Adjustment Actions</text>
  <path class="data-flow" d="M450 530 L260 720"/>
  <text class="flow-text" x="310" y="660">Pending Actions &amp;</text>
  <text class="flow-text" x="310" y="675">Vault/Stock Summaries</text>

  <!-- Delivery Person -->
  <g transform="translate(800, 700)">
    <rect class="entity" width="160" height="80"/>
    <text class="entity-text" x="80" y="40">Delivery Person</text>
  </g>
  <path class="data-flow" d="M800 720 L680 530"/>
  <text class="flow-text" x="720" y="640">Pickup &amp; Delivery Updates</text>
  <path class="data-flow" d="M700 530 L820 700"/>
  <text class="flow-text" x="760" y="600">Assignment Details</text>

  <!-- HQ Logistics Officer (NEW) -->
  <g transform="translate(450, 100)">
    <rect class="entity" width="200" height="80" style="fill: #fef3c7; stroke: #b45309;"/>
    <text class="entity-text" x="100" y="30">HQ Logistics</text>
    <text class="entity-text" x="100" y="50">Officer</text>
  </g>
  <path class="data-flow" d="M550 180 L550 330"/>
  <text class="flow-text" x="555" y="235">Routing Decisions &amp;</text>
  <text class="flow-text" x="555" y="250">Branch Assignments</text>
  <path class="data-flow" d="M530 330 L530 180"/>
  <text class="flow-text" x="470" y="235">Pending HQ Queue &amp;</text>
  <text class="flow-text" x="470" y="250">Vault Balance Info</text>

  <text class="figure-text" x="550" y="850">Figure 7.1 DFD Level 0 (Context Diagram)</text>
</svg>

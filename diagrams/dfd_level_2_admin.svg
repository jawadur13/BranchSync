<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="900" viewBox="0 0 1000 900">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 24px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
      .process { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; rx: 20; }
      .process-text { font: 700 13px Arial, sans-serif; fill: #1e40af; text-anchor: middle; dominant-baseline: middle; }
      .data-store { fill: #ffffff; stroke: #333333; stroke-width: 1.5; }
      .ds-label { font: 700 12px Arial, sans-serif; fill: #333333; }
      .data-flow { stroke: #111827; stroke-width: 1.1; fill: none; marker-end: url(#arrow); }
      .flow-text { font: 400 10px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L5,3 z" fill="#111827"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="1000" height="900"/>
  <text class="title" x="500" y="50">DFD Level 2: Administration &amp; Data Management</text>

  <!-- Input from Admin -->
  <text x="50" y="120" font-weight="bold">System Admin</text>
  <path class="data-flow" d="M50 140 L250 140"/><text class="flow-text" x="100" y="130">Admin Commands</text>

  <!-- 2.1 User Crud -->
  <rect class="process" x="250" y="110" width="180" height="60"/>
  <text class="process-text" x="340" y="140">2.1 Manage Users</text>
  <path class="data-flow" d="M430 140 L600 140"/><text class="flow-text" x="480" y="130">Write User Record</text>

  <!-- 2.2 Branch Crud -->
  <rect class="process" x="250" y="250" width="180" height="60"/>
  <text class="process-text" x="340" y="280">2.2 Manage Branches</text>
  <path class="data-flow" d="M430 280 L600 280"/><text class="flow-text" x="480" y="270">Write Branch Record</text>

  <!-- 2.3 Department Mapping -->
  <rect class="process" x="250" y="390" width="180" height="60"/>
  <text class="process-text" x="340" y="420">2.3 Map Departments</text>
  <path class="data-flow" d="M430 420 L600 420"/><text class="flow-text" x="480" y="410">Update Mappings</text>

  <!-- 2.4 Category Config -->
  <rect class="process" x="250" y="530" width="180" height="60"/>
  <text class="process-text" x="340" y="560">2.4 Item Categories</text>
  <path class="data-flow" d="M430 560 L600 560"/><text class="flow-text" x="480" y="550">Save Sensitivity Levels</text>

  <!-- Data Stores -->
  <path class="data-store" d="M600 100 L850 100 M600 200 L850 200"/>
  <text class="ds-label" x="650" y="150">D1: User DB</text>

  <path class="data-store" d="M600 240 L850 240 M600 650 L850 650"/>
  <text class="ds-label" x="650" y="450">D2: Org Config DB</text>

  <!-- Final Sync -->
  <path class="data-flow" d="M340 590 L340 750"/>
  <rect class="process" x="250" y="750" width="180" height="60"/>
  <text class="process-text" x="340" y="780">2.5 Integrity Check</text>
  <path class="data-flow" d="M430 780 L800 780"/><text class="flow-text" x="500" y="770">Confirm Consistency</text>

</svg>

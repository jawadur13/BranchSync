<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 24px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
      .entity { fill: #f3f4f6; stroke: #374151; stroke-width: 1.5; }
      .entity-text { font: 700 13px Arial, sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .process { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.8; rx: 30; }
      .process-text { font: 700 14px Arial, sans-serif; fill: #1e40af; text-anchor: middle; dominant-baseline: middle; }
      .data-store { fill: #ffffff; stroke: #333333; stroke-width: 1.5; }
      .ds-label { font: 700 12px Arial, sans-serif; fill: #333333; }
      .data-flow { stroke: #111827; stroke-width: 1.1; fill: none; marker-end: url(#arrow); }
      .flow-text { font: 400 10px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L5,3 z" fill="#111827"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="1400" height="1000"/>
  <text class="title" x="700" y="50">DFD Level 1: System Overview</text>

  <!-- Entities -->
  <g transform="translate(50, 150)"><rect class="entity" width="120" height="60"/><text class="entity-text" x="60" y="30">System Admin</text></g>
  <g transform="translate(50, 450)"><rect class="entity" width="120" height="60"/><text class="entity-text" x="60" y="30">Requester</text></g>
  <g transform="translate(1230, 450)"><rect class="entity" width="120" height="60"/><text class="entity-text" x="60" y="30">Approver / FEO</text></g>
  <g transform="translate(1230, 750)"><rect class="entity" width="120" height="60"/><text class="entity-text" x="60" y="30">Delivery Person</text></g>

  <!-- Processes -->
  
  <!-- 1.0 Login & Auth -->
  <rect class="process" x="400" y="150" width="180" height="80"/>
  <text class="process-text" x="490" y="190">1.0 User Auth &amp; Access</text>

  <!-- 2.0 User & Org Admin -->
  <rect class="process" x="400" y="350" width="180" height="80"/>
  <text class="process-text" x="490" y="390">2.0 User &amp; Org Mgmt</text>

  <!-- 3.0 Transfer Lifecycle -->
  <rect class="process" x="800" y="450" width="200" height="100"/>
  <text class="process-text" x="900" y="500">3.0 Transfer Lifecycle</text>

  <!-- 4.0 Audit Service -->
  <rect class="process" x="800" y="750" width="180" height="80"/>
  <text class="process-text" x="890" y="790">4.0 Audit &amp; Logging</text>

  <!-- Data Stores -->
  <path class="data-store" d="M350 550 L550 550 M350 600 L550 600"/>
  <text class="ds-label" x="360" y="580">D1: User Database</text>

  <path class="data-store" d="M350 700 L550 700 M350 750 L550 750"/>
  <text class="ds-label" x="360" y="730">D2: Org Config (Branch/Dept)</text>

  <path class="data-store" d="M850 150 L1050 150 M850 200 L1050 200"/>
  <text class="ds-label" x="860" y="180">D3: Transfer Database</text>

  <path class="data-store" d="M850 300 L1050 300 M850 350 L1050 350"/>
  <text class="ds-label" x="860" y="330">D4: Audit Logs</text>

  <!-- Flows -->
  
  <!-- Admin to Processes -->
  <path class="data-flow" d="M170 180 L400 190"/><text class="flow-text" x="220" y="180">Login Details</text>
  <path class="data-flow" d="M170 210 L400 370"/><text class="flow-text" x="220" y="300">Admin Actions</text>

  <!-- Requester to Transfers -->
  <path class="data-flow" d="M170 480 L800 500"/><text class="flow-text" x="400" y="480">New Transfer Request</text>

  <!-- Process to Stores -->
  <path class="data-flow" d="M490 230 L450 550"/><text class="flow-text" x="420" y="400">Validate User</text>
  <path class="data-flow" d="M490 430 L450 550"/>
  <path class="data-flow" d="M490 430 L450 700"/>

  <path class="data-flow" d="M900 450 L950 200"/><text class="flow-text" x="930" y="300">Update Request</text>
  <path class="data-flow" d="M900 550 L900 750"/><text class="flow-text" x="910" y="650">Capture Event</text>
  <path class="data-flow" transform="translate(50, 0)" d="M900 830 C1100 830 1150 450 1050 330"/>

  <!-- External to Transfers -->
  <path class="data-flow" d="M1230 480 L1000 500"/><text class="flow-text" x="1100" y="480">Approval/Release</text>
  <path class="data-flow" d="M1230 780 L1000 530"/><text class="flow-text" x="1150" y="650">Pickup/Delivery</text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 24px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
      .entity { fill: #f3f4f6; stroke: #374151; stroke-width: 1.5; }
      .entity-text { font: 700 14px Arial, sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .process { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 40; }
      .process-id { font: 700 16px Arial, sans-serif; fill: #1e40af; text-anchor: middle; }
      .process-text { font: 700 18px Arial, sans-serif; fill: #1e40af; text-anchor: middle; }
      .data-flow { stroke: #111827; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
      .flow-text { font: 400 11px Arial, sans-serif; fill: #374151; }
      .figure-text { font: 700 18px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L7,4 z" fill="#111827"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="1000" height="800"/>
  <text class="title" x="500" y="50">DFD Level 0: Context Diagram</text>

  <!-- Central Process -->
  <rect class="process" x="350" y="300" width="300" height="200"/>
  <line x1="350" y1="360" x2="650" y2="360" stroke="#2563eb" stroke-width="1.5"/>
  <text class="process-id" x="500" y="340">0</text>
  <text class="process-text" x="500" y="420">BranchSync System</text>

  <!-- Entities -->
  
  <!-- System Admin -->
  <g transform="translate(100, 100)">
    <rect class="entity" width="160" height="80"/>
    <text class="entity-text" x="80" y="40">System Admin</text>
  </g>
  <path class="data-flow" d="M180 180 L350 320"/>
  <text class="flow-text" x="210" y="240">User &amp; Org Management</text>
  <path class="data-flow" d="M350 350 L200 180"/>
  <text class="flow-text" x="210" y="280">System Activity Logs</text>

  <!-- Officer (Requester) -->
  <g transform="translate(740, 100)">
    <rect class="entity" width="160" height="80"/>
    <text class="entity-text" x="80" y="40">Officer (Requester)</text>
  </g>
  <path class="data-flow" d="M740 160 L620 300"/>
  <text class="flow-text" x="650" y="220">Transfer Requests</text>
  <path class="data-flow" d="M650 330 L760 180"/>
  <text class="flow-text" x="710" y="260">Status Notifications</text>

  <!-- Branch Manager / FEO -->
  <g transform="translate(100, 620)">
    <rect class="entity" width="160" height="80"/>
    <text class="entity-text" x="80" y="40">Branch Manager / FEO</text>
  </g>
  <path class="data-flow" d="M260 620 L380 500"/>
  <text class="flow-text" x="250" y="560">Approval &amp; Release Actions</text>
  <path class="data-flow" d="M420 500 L260 640"/>
  <text class="flow-text" x="310" y="590">Pending Action List</text>

  <!-- Delivery Person -->
  <g transform="translate(740, 620)">
    <rect class="entity" width="160" height="80"/>
    <text class="entity-text" x="80" y="40">Delivery Person</text>
  </g>
  <path class="data-flow" d="M740 640 L600 500"/>
  <text class="flow-text" x="660" y="590">Logistics Updates</text>
  <path class="data-flow" d="M630 500 L760 620"/>
  <text class="flow-text" x="700" y="550">Assignment Details</text>

  <text class="figure-text" x="500" y="750">Figure 7.1 DFD Level 0 (Context Diagram)</text>
</svg>

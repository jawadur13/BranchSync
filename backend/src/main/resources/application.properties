# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_KEY}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Supabase Configuration (Custom properties)
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}

# Jamuna Bank PLC Specific Configuration
jamunabank.branchsync.supported-roles=BRANCH_MANAGER,FIRST_EXECUTIVE_OFFICER,OFFICER

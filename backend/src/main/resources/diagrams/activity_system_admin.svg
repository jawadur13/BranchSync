<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 24px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
      .activity { fill: #ffffff; stroke: #333333; stroke-width: 1.2; rx: 15; }
      .activity-text { font: 400 12px Arial, sans-serif; fill: #111111; text-anchor: middle; dominant-baseline: middle; }
      .decision { fill: #ffffff; stroke: #333333; stroke-width: 1.2; }
      .decision-text { font: 700 11px Arial, sans-serif; fill: #111111; text-anchor: middle; dominant-baseline: middle; }
      .flow-line { stroke: #333333; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
      .start-node { fill: #111111; }
      .end-node { fill: #ffffff; stroke: #111111; stroke-width: 2; }
      .end-inner { fill: #111111; }
      .label { font: 400 11px Arial, sans-serif; fill: #666666; }
      .fork { stroke: #111111; stroke-width: 4; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L7,4 z" fill="#333333"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="1000" height="800"/>
  <text class="title" x="500" y="50">Activity Diagram: System Administration</text>

  <!-- Start -->
  <circle class="start-node" cx="500" cy="100" r="10"/>
  <line class="flow-line" x1="500" y1="110" x2="500" y2="150"/>

  <rect class="activity" x="425" y="150" width="150" height="40"/>
  <text class="activity-text" x="500" y="170">Access Admin Panel</text>
  <line class="flow-line" x1="500" y1="190" x2="500" y2="230"/>

  <!-- Fork -->
  <line class="fork" x1="200" y1="230" x2="800" y2="230"/>
  
  <!-- User Management -->
  <line class="flow-line" x1="250" y1="230" x2="250" y2="280"/>
  <rect class="activity" x="175" y="280" width="150" height="40"/>
  <text class="activity-text" x="250" y="300">User Management</text>
  <line class="flow-line" x1="250" y1="320" x2="250" y2="360"/>
  <rect class="activity" x="175" y="360" width="150" height="60"/>
  <text class="activity-text" x="250" y="380">Create/Edit User</text>
  <text class="activity-text" x="250" y="395">Assign Role &amp; Branch</text>
  <line class="flow-line" x1="250" y1="420" x2="250" y2="470"/>

  <!-- Org Management -->
  <line class="flow-line" x1="500" y1="230" x2="500" y2="280"/>
  <rect class="activity" x="425" y="280" width="150" height="40"/>
  <text class="activity-text" x="500" y="300">Org Configuration</text>
  <line class="flow-line" x1="500" y1="320" x2="500" y2="360"/>
  <rect class="activity" x="425" y="360" width="150" height="60"/>
  <text class="activity-text" x="500" y="380">Add/Update Branch</text>
  <text class="activity-text" x="500" y="395">&amp; Departments</text>
  <line class="flow-line" x1="500" y1="420" x2="500" y2="470"/>

  <!-- Master Data -->
  <line class="flow-line" x1="750" y1="230" x2="750" y2="280"/>
  <rect class="activity" x="675" y="280" width="150" height="40"/>
  <text class="activity-text" x="750" y="300">Item Master Data</text>
  <line class="flow-line" x1="750" y1="320" x2="750" y2="360"/>
  <rect class="activity" x="675" y="360" width="150" height="60"/>
  <text class="activity-text" x="750" y="380">Define Categories</text>
  <text class="activity-text" x="750" y="395">&amp; Sensitivity Levels</text>
  <line class="flow-line" x1="750" y1="420" x2="750" y2="470"/>

  <!-- Join -->
  <line class="fork" x1="200" y1="470" x2="800" y2="470"/>
  <line class="flow-line" x1="500" y1="470" x2="500" y2="520"/>

  <rect class="activity" x="425" y="520" width="150" height="40"/>
  <text class="activity-text" x="500" y="540">Sync to Database</text>
  <line class="flow-line" x1="500" y1="560" x2="500" y2="610"/>

  <rect class="activity" x="425" y="610" width="150" height="40"/>
  <text class="activity-text" x="500" y="630">Update Audit Logs</text>
  <line class="flow-line" x1="500" y1="650" x2="500" y2="700"/>

  <!-- End -->
  <g transform="translate(500, 720)">
    <circle class="end-node" cx="0" cy="0" r="15"/>
    <circle class="end-inner" cx="0" cy="0" r="8"/>
  </g>

</svg>

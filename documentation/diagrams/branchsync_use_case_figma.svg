<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 24px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
      .subtitle { font: 400 13px Arial, sans-serif; fill: #52657a; text-anchor: middle; }
      .boundary { fill: #f8fbff; stroke: #2f5f9f; stroke-width: 2; rx: 12; }
      .boundary-title { font: 700 16px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
      .actor-line { stroke: #1f3e66; stroke-width: 2.2; fill: none; }
      .actor-text { font: 700 13px Arial, sans-serif; fill: #101820; text-anchor: middle; }
      .usecase { fill: #dfeecb; stroke: #2f5f9f; stroke-width: 2; }
      .usecase-text { font: 600 12px Arial, sans-serif; fill: #101820; text-anchor: middle; dominant-baseline: middle; }
      .link { stroke: #3f78bf; stroke-width: 1.8; fill: none; }
      .include { stroke: #6c86aa; stroke-width: 1.4; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
      .include-text { font: 600 10px Arial, sans-serif; fill: #52657a; text-anchor: middle; }
      .note { fill: #fff8db; stroke: #d7b84f; stroke-width: 1.5; rx: 6; }
      .note-text { font: 400 11px Arial, sans-serif; fill: #4f4211; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6c86aa"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="1000"/>
  <rect x="12" y="12" width="1576" height="976" fill="none" stroke="#dce8f7"/>
  <text class="title" x="800" y="42">BranchSync Use Case Diagram</text>
  <text class="subtitle" x="800" y="64">Jamuna Bank PLC inter-branch transfer and requisition workflow</text>

  <!-- System Boundary -->
  <rect class="boundary" x="300" y="95" width="1000" height="800"/>
  <text class="boundary-title" x="800" y="122">BranchSync System</text>

  <!-- Actors: left side -->
  <g id="actor-system-admin" transform="translate(125 175)">
    <circle class="actor-line" cx="0" cy="0" r="18"/>
    <path class="actor-line" d="M0 18 L0 72 M-35 38 L35 38 M0 72 L-28 115 M0 72 L28 115"/>
    <text class="actor-text" x="0" y="145">System Admin</text>
  </g>

  <g id="actor-officer" transform="translate(125 410)">
    <circle class="actor-line" cx="0" cy="0" r="18"/>
    <path class="actor-line" d="M0 18 L0 72 M-35 38 L35 38 M0 72 L-28 115 M0 72 L28 115"/>
    <text class="actor-text" x="0" y="145">Officer / Requester</text>
  </g>

  <g id="actor-manager" transform="translate(125 655)">
    <circle class="actor-line" cx="0" cy="0" r="18"/>
    <path class="actor-line" d="M0 18 L0 72 M-35 38 L35 38 M0 72 L-28 115 M0 72 L28 115"/>
    <text class="actor-text" x="0" y="145">Manager / FEO / OM</text>
  </g>

  <!-- Actors: right side -->
  <g id="actor-destination-staff" transform="translate(1475 270)">
    <circle class="actor-line" cx="0" cy="0" r="18"/>
    <path class="actor-line" d="M0 18 L0 72 M-35 38 L35 38 M0 72 L-28 115 M0 72 L28 115"/>
    <text class="actor-text" x="0" y="145">Destination Staff</text>
  </g>

  <g id="actor-delivery" transform="translate(1475 575)">
    <circle class="actor-line" cx="0" cy="0" r="18"/>
    <path class="actor-line" d="M0 18 L0 72 M-35 38 L35 38 M0 72 L-28 115 M0 72 L28 115"/>
    <text class="actor-text" x="0" y="145">Delivery Person</text>
  </g>

  <!-- Shared use cases -->
  <ellipse class="usecase" cx="500" cy="185" rx="110" ry="34"/>
  <text class="usecase-text" x="500" y="185">Login</text>

  <ellipse class="usecase" cx="500" cy="275" rx="110" ry="34"/>
  <text class="usecase-text" x="500" y="275">View Dashboard</text>

  <ellipse class="usecase" cx="500" cy="365" rx="110" ry="34"/>
  <text class="usecase-text" x="500" y="365">View Profile</text>

  <ellipse class="usecase" cx="500" cy="455" rx="120" ry="34"/>
  <text class="usecase-text" x="500" y="455">View Transfer History</text>

  <!-- Admin use cases -->
  <ellipse class="usecase" cx="800" cy="185" rx="125" ry="34"/>
  <text class="usecase-text" x="800" y="185">Manage Users</text>

  <ellipse class="usecase" cx="800" cy="275" rx="145" ry="34"/>
  <text class="usecase-text" x="800" y="275">Manage Branches</text>

  <ellipse class="usecase" cx="800" cy="365" rx="150" ry="34"/>
  <text class="usecase-text" x="800" y="365">Manage Departments</text>

  <ellipse class="usecase" cx="800" cy="455" rx="155" ry="34"/>
  <text class="usecase-text" x="800" y="455">Manage Item Categories</text>

  <!-- Transfer workflow use cases -->
  <ellipse class="usecase" cx="800" cy="570" rx="145" ry="34"/>
  <text class="usecase-text" x="800" y="570">Create Transfer Request</text>

  <ellipse class="usecase" cx="800" cy="660" rx="155" ry="34"/>
  <text class="usecase-text" x="800" y="660">Approve Internally</text>

  <ellipse class="usecase" cx="1090" cy="570" rx="165" ry="34"/>
  <text class="usecase-text" x="1090" y="570">Accept &amp; Assign Driver</text>

  <ellipse class="usecase" cx="1090" cy="660" rx="145" ry="34"/>
  <text class="usecase-text" x="1090" y="660">Final Release</text>

  <ellipse class="usecase" cx="1090" cy="750" rx="125" ry="34"/>
  <text class="usecase-text" x="1090" y="750">Confirm Pickup</text>

  <ellipse class="usecase" cx="800" cy="750" rx="125" ry="34"/>
  <text class="usecase-text" x="800" y="750">Confirm Delivery</text>

  <ellipse class="usecase" cx="500" cy="750" rx="150" ry="34"/>
  <text class="usecase-text" x="500" y="750">Accept / Reject Receipt</text>

  <!-- Internal audit use case -->
  <ellipse class="usecase" cx="1090" cy="820" rx="125" ry="30"/>
  <text class="usecase-text" x="1090" y="820">Write Audit Log</text>

  <!-- Actor associations -->
  <path class="link" d="M125 175 C225 170 330 175 390 185"/>
  <path class="link" d="M125 175 C235 200 330 235 392 275"/>
  <path class="link" d="M125 175 C245 195 610 178 675 185"/>
  <path class="link" d="M125 175 C245 235 610 265 655 275"/>
  <path class="link" d="M125 175 C245 285 610 350 650 365"/>
  <path class="link" d="M125 175 C245 345 610 435 650 455"/>

  <path class="link" d="M125 410 C250 400 370 380 405 365"/>
  <path class="link" d="M125 410 C250 430 360 445 380 455"/>
  <path class="link" d="M125 410 C250 500 610 555 655 570"/>
  <path class="link" d="M125 410 C255 615 380 720 360 750"/>

  <path class="link" d="M125 655 C245 650 590 650 645 660"/>
  <path class="link" d="M125 655 C300 650 920 650 945 660"/>
  <path class="link" d="M125 655 C250 600 620 570 655 570"/>

  <path class="link" d="M1475 270 C1370 345 1250 500 1235 570"/>
  <path class="link" d="M1475 270 C1365 390 1245 625 1230 660"/>

  <path class="link" d="M1475 575 C1370 610 1235 710 1215 750"/>
  <path class="link" d="M1475 575 C1360 675 960 740 925 750"/>

  <!-- Include/dependency links -->
  <path class="include" d="M800 604 C840 710 980 800 975 820"/>
  <text class="include-text" x="910" y="735">&lt;&lt;include&gt;&gt;</text>

  <path class="include" d="M800 694 C850 765 985 805 975 820"/>
  <path class="include" d="M1090 604 C1095 690 1095 760 1090 790"/>
  <path class="include" d="M1090 694 C1100 735 1100 775 1090 790"/>
  <path class="include" d="M1090 784 C1095 795 1095 805 1090 790"/>
  <path class="include" d="M800 784 C880 800 965 812 965 820"/>
  <path class="include" d="M500 784 C670 850 920 850 965 820"/>

  <!-- Workflow note -->
  <rect class="note" x="345" y="845" width="910" height="42"/>
  <text class="note-text" x="365" y="865">Workflow order: Create Request -> Internal Approval -> Destination Acceptance &amp; Driver Assignment -> Final Release -> Pickup -> Delivery -> Requester Verification</text>
</svg>

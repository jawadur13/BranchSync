<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 28px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
      .participant-box { fill: #f5f5f5; stroke: #a0a0a0; stroke-width: 1; }
      .participant-text { font: 400 14px Arial, sans-serif; fill: #333333; text-anchor: middle; dominant-baseline: middle; }
      .lifeline { stroke: #d0d0d0; stroke-width: 1; stroke-dasharray: 4 4; }
      .phase-box { fill: #e7f3ff; stroke: #3b82f6; stroke-width: 1; stroke-dasharray: 4 4; opacity: 0.6; }
      .phase-text { font: 700 16px Arial, sans-serif; fill: #1e40af; text-anchor: middle; }
      .msg-line { stroke: #333333; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
      .return-line { stroke: #666666; stroke-width: 1; stroke-dasharray: 5 4; fill: none; marker-end: url(#arrow-gray); }
      .msg-text { font: 400 12px Arial, sans-serif; fill: #111111; }
      .step-circle { fill: #111111; }
      .step-number { font: 700 10px Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .figure-text { font: 700 18px Arial, sans-serif; fill: #12355f; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L7,4 z" fill="#333333"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L7,4 z" fill="#666666"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="1200" height="1500"/>
  
  <text class="title" x="600" y="50">Sequence Diagram</text>

  <!-- Participants -->
  <g transform="translate(100, 100)">
    <rect class="participant-box" width="120" height="40"/>
    <text class="participant-text" x="60" y="20">User (Officer)</text>
    <line class="lifeline" x1="60" y1="40" x2="60" y2="1350"/>
  </g>

  <g transform="translate(300, 100)">
    <rect class="participant-box" width="120" height="40"/>
    <text class="participant-text" x="60" y="20">Web Portal (UI)</text>
    <line class="lifeline" x1="60" y1="40" x2="60" y2="1350"/>
  </g>

  <g transform="translate(550, 100)">
    <rect class="participant-box" width="140" height="40"/>
    <text class="participant-text" x="70" y="20">BranchSync Server</text>
    <line class="lifeline" x1="70" y1="40" x2="70" y2="1350"/>
  </g>

  <g transform="translate(800, 100)">
    <rect class="participant-box" width="120" height="40"/>
    <text class="participant-text" x="60" y="20">Central Database</text>
    <line class="lifeline" x1="60" y1="40" x2="60" y2="1350"/>
  </g>

  <g transform="translate(1000, 100)">
    <rect class="participant-box" width="120" height="40"/>
    <text class="participant-text" x="60" y="20">Action Logger</text>
    <line class="lifeline" x1="60" y1="40" x2="60" y2="1350"/>
  </g>

  <!-- Phase 1: Login -->
  <rect class="phase-box" x="50" y="180" width="1100" height="280"/>
  <text class="phase-text" x="600" y="205">Phase 1: Login &amp; Authentication</text>

  <g transform="translate(160, 240)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">1</text>
    <line class="msg-line" x1="10" y1="0" x2="200" y2="0"/>
    <text class="msg-text" x="20" y="-10">Enters ID &amp; Password</text>
  </g>

  <g transform="translate(360, 280)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">2</text>
    <line class="msg-line" x1="10" y1="0" x2="260" y2="0"/>
    <text class="msg-text" x="20" y="-10">Request Login</text>
  </g>

  <g transform="translate(620, 320)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">3</text>
    <line class="msg-line" x1="10" y1="0" x2="240" y2="0"/>
    <text class="msg-text" x="20" y="-10">Verify User Details</text>
  </g>

  <g transform="translate(860, 360)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">4</text>
    <line class="return-line" x1="0" y1="0" x2="-240" y2="0"/>
    <text class="msg-text" x="-180" y="-10" text-anchor="end">User Found</text>
  </g>

  <g transform="translate(620, 420)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">5</text>
    <line class="return-line" x1="0" y1="0" x2="-260" y2="0"/>
    <text class="msg-text" x="-180" y="-10" text-anchor="end">Login Successful (Token)</text>
  </g>

  <!-- Phase 2: Create Request -->
  <rect class="phase-box" x="50" y="500" width="1100" height="380"/>
  <text class="phase-text" x="600" y="525">Phase 2: Initiating a Transfer Request</text>

  <g transform="translate(160, 580)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">6</text>
    <line class="msg-line" x1="10" y1="0" x2="200" y2="0"/>
    <text class="msg-text" x="20" y="-10">Fill Form &amp; Submit</text>
  </g>

  <g transform="translate(360, 620)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">7</text>
    <line class="msg-line" x1="10" y1="0" x2="260" y2="0"/>
    <text class="msg-text" x="20" y="-10">Send Request Data</text>
  </g>

  <g transform="translate(620, 680)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">8</text>
    <line class="msg-line" x1="10" y1="0" x2="240" y2="0"/>
    <text class="msg-text" x="20" y="-10">Validate &amp; Save Request</text>
  </g>

  <g transform="translate(620, 740)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">9</text>
    <line class="msg-line" x1="10" y1="0" x2="440" y2="0"/>
    <text class="msg-text" x="20" y="-10">Log "Request Created" Action</text>
  </g>

  <g transform="translate(620, 800)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">10</text>
    <line class="return-line" x1="0" y1="0" x2="-260" y2="0"/>
    <text class="msg-text" x="-180" y="-10" text-anchor="end">Request Confirmed</text>
  </g>

  <!-- Phase 3: Workflow Actions -->
  <rect class="phase-box" x="50" y="920" width="1100" height="420"/>
  <text class="phase-text" x="600" y="945">Phase 3: Approval &amp; Completion Workflow</text>

  <g transform="translate(160, 1000)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">11</text>
    <line class="msg-line" x1="10" y1="0" x2="200" y2="0"/>
    <text class="msg-text" x="20" y="-10">Approver clicks "Approve"</text>
  </g>

  <g transform="translate(360, 1040)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">12</text>
    <line class="msg-line" x1="10" y1="0" x2="260" y2="0"/>
    <text class="msg-text" x="20" y="-10">Process Workflow Action</text>
  </g>

  <g transform="translate(620, 1080)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">13</text>
    <line class="msg-line" x1="10" y1="0" x2="240" y2="0"/>
    <text class="msg-text" x="20" y="-10">Update Request Status</text>
  </g>

  <g transform="translate(620, 1140)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" r="10">14</text>
    <line class="msg-line" x1="10" y1="0" x2="440" y2="0"/>
    <text class="msg-text" x="20" y="-10">Log "Approved" Action</text>
  </g>

  <g transform="translate(160, 1220)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">15</text>
    <line class="msg-line" x1="10" y1="0" x2="200" y2="0"/>
    <text class="msg-text" x="20" y="-10">Delivery Person confirms "Delivered"</text>
  </g>

  <g transform="translate(620, 1280)">
    <circle class="step-circle" cx="0" cy="0" r="10"/>
    <text class="step-number" x="0" y="0">16</text>
    <line class="return-line" x1="0" y1="0" x2="-260" y2="0"/>
    <text class="msg-text" x="-180" y="-10" text-anchor="end">Workflow Complete</text>
  </g>

  <text class="figure-text" x="600" y="1450">Figure 4.8 Sequence Diagram (BranchSync Workflow)</text>

</svg>
